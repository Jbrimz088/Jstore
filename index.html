<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Install J-Store</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.3);
            border: 1px solid #4b0082;
            width: 80%;
            max-width: 350px;
        }
        img {
            width: 100px;
            height: 100px;
            border-radius: 22px;
            margin-bottom: 20px;
            border: 2px solid #8a2be2;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 14px;
            color: #b19cd9;
            margin-bottom: 30px;
        }
        .install-btn {
            display: inline-block;
            background-color: #8a2be2;
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .install-btn:active {
            transform: scale(0.95);
            background-color: #6a1b9a;
        }
        .footer {
            margin-top: 20px;
            font-size: 10px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="jstore-logo.png" alt="J-Store Logo">
        <h1>J-Store</h1>
        <p>Tap below to install the J-TV WebClip profile to your device.</p>
        
        <a href="J-TV-WebClip.mobileconfig" class="install-btn">Install Profile</a>
    </div>

    <div class="footer">
        Open this page in Safari on your iOS device.
    </div>

</body>
</html>
